<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="top">
        <div>
            <h1>Registration <span>Form</span></h1>
            <p>This space is where you can share information on the section.</p>
        </div>

        <div class="date-box">
            <label>DATE OF REGISTRATION</label><br>
            <input class="small"> /
            <input class="small"> /
            <input class="small">
        </div>
    </div>

    <!-- PERSONAL INFO -->
    <h2>PERSONAL INFORMATION</h2>

    <form>

        <div class="row full">
            <label>Full Name :</label>
            <input type="text">
        </div>

        <div class="row">
            <div>
                <label>Nickname :</label>
                <input type="text">
            </div>

            <div>
                <label>Place Of Birth :</label>
                <input type="text">
            </div>
        </div>

        <div class="row">
            <div>
                <label>Date of Birth :</label><br>
                <input class="small"> /
                <input class="small"> /
                <input class="small">
            </div>

            <div>
                <label>Nationality :</label>
                <input type="text">
            </div>
        </div>

        <div class="row">
            <div>
                <label>Email :</label>
                <input type="email">
            </div>

            <div>
                <label>Phone :</label>
                <input type="text">
            </div>
        </div>

        <div class="row">
            <div>
                <label>Gender :</label><br>
                <input type="checkbox"> Male
                <input type="checkbox"> Female
            </div>

            <div>
                <label>Marital Status :</label>
                <input type="text">
            </div>
        </div>

        <div class="row">
            <div>
                <label>Country :</label>
                <input type="text">
            </div>

            <div>
                <label>Post Code :</label>
                <input type="text">
            </div>
        </div>

        <!-- ADDRESS -->
        <h2>ADDRESS</h2>

        <div class="row full">
            <label>Present Address :</label>
            <input type="text">
        </div>

        <div class="row">
            <div>
                <label>The City :</label>
                <input type="text">
            </div>

            <div>
                <label>Present State :</label>
                <input type="text">
            </div>
        </div>

        <div class="row">
            <div>
                <label>Zip Code :</label>
                <input type="text">
            </div>

            <div>
                <label>Student Trustee :</label>
                <input type="text">
            </div>
        </div>

        <!-- SIGNATURE -->
        <div class="sign">
            <div>Register Signature</div>
            <div>Officer Signature</div>
        </div>

    </form>

</div>

</body>
</html>
