<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">

        <h2>Get in touch</h2>

        <p><b>Name</b><br> HTML CSS Tutorials</p>
        <p><b>Email</b><br> htmlcss3tutorials@gmail.com</p>
        <p><b>Phone</b><br> +91 1234567890</p>
        <p><b>Address</b><br> 123 Street, Bangalore, India</p>

        <div class="social">
            <span>F</span>
            <span>T</span>
            <span>I</span>
        </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <h2>Contact Us</h2>

        <form>

            <input type="text" placeholder="Full Name">
            <input type="email" placeholder="Email ID">
            <input type="text" placeholder="Website">
            <input type="text" placeholder="Contact Number">
            <textarea placeholder="Message"></textarea>

            <button type="submit">Submit</button>

        </form>

    </div>

</div>

</body>
</html>
