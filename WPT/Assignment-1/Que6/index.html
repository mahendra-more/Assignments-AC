<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Sign Up</h1>

    <form>

        <div class="input-box">
            <label>First Name</label>
            <input type="text">
        </div>

        <div class="input-box">
            <label>Last Name</label>
            <input type="text">
        </div>

        <div class="input-box">
            <label>Email</label>
            <input type="email">
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password">
        </div>

        <p class="login-text">
            Already a member? <a href="#">Log In</a>
        </p>

        <button type="submit">Sign up</button>

    </form>

</div>

</body>
</html>
