<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>STUDENT REGISTRATION FORM</h1>

<div class="container">

<form>

<div class="row">
    <label>First Name</label>
    <input type="text"> <span>(max 30 characters)</span>
</div>

<div class="row">
    <label>Last Name</label>
    <input type="text"> <span>(max 30 characters)</span>
</div>

<div class="row">
    <label>Date of Birth</label>
    <select><option>Day</option></select>
    <select><option>Month</option></select>
    <select><option>Year</option></select>
</div>

<div class="row">
    <label>Email ID</label>
    <input type="email">
</div>

<div class="row">
    <label>Mobile Number</label>
    <input type="text"> <span>(10 digit number)</span>
</div>

<div class="row">
    <label>Gender</label>
    <input type="radio" name="g"> Male
    <input type="radio" name="g"> Female
</div>

<div class="row">
    <label>Address</label>
    <textarea></textarea>
</div>

<div class="row">
    <label>City</label>
    <input type="text">
</div>

<div class="row">
    <label>Pin Code</label>
    <input type="text">
</div>

<div class="row">
    <label>State</label>
    <input type="text">
</div>

<div class="row">
    <label>Country</label>
    <input type="text" value="India">
</div>

<div class="row">
    <label>Hobbies</label>
    <input type="checkbox"> Drawing
    <input type="checkbox"> Singing
    <input type="checkbox"> Dancing
    <input type="checkbox"> Sketching <br>
    Others <input type="text">
</div>

<!-- QUALIFICATION -->
<div class="row">
    <label>Qualification</label>

    <table>
        <tr>
            <th>Sl.No</th>
            <th>Examination</th>
            <th>Board</th>
            <th>Percentage</th>
            <th>Year</th>
        </tr>

        <tr>
            <td>1</td>
            <td>Class X</td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
        </tr>

        <tr>
            <td>2</td>
            <td>Class XII</td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
        </tr>

        <tr>
            <td>3</td>
            <td>Graduation</td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
        </tr>

        <tr>
            <td>4</td>
            <td>Masters</td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
        </tr>
    </table>
</div>

<div class="row">
    <label>Courses Applied</label>
    <input type="radio" name="c"> BCA
    <input type="radio" name="c"> B.Com
    <input type="radio" name="c"> B.Sc
    <input type="radio" name="c"> B.A
</div>

<!-- BUTTONS -->
<div class="btn">
    <button class="submit">Submit</button>
    <button class="reset">Reset</button>
</div>

</form>

</div>

</body>
</html>
