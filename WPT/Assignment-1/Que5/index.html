<!DOCTYPE html>
<html>
<head>
    <title>Application Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Application Form</h2>

<div class="container">

<form>

<div class="form-row">
    <label>First Name *</label>
    <input type="text">
    <span>(Max 35 Characters)</span>
</div>

<div class="form-row">
    <label>Confirm First Name *</label>
    <input type="text">
    <span>(Max 35 Characters)</span>
</div>

<div class="form-row">
    <label>Middle Name</label>
    <input type="text">
    <span>(Max 35 Characters)</span>
</div>

<div class="form-row">
    <label>Last Name *</label>
    <input type="text">
    <span>(Max 35 Characters)</span>
</div>

<div class="form-row">
    <label>Mobile No *</label>
    <input type="text">
    <span>(10 digits)</span>
</div>

<div class="form-row">
    <label>Email ID *</label>
    <input type="email">
    <span>(Max 60 Characters)</span>
</div>

<div class="form-row">
    <label>Confirm Email *</label>
    <input type="email">
</div>

<div class="form-row">
    <label>Security Code *</label>
    <input type="text">
</div>

<div class="btn">
    <button>Submit</button>
</div>

</form>

</div>

</body>
</html>
