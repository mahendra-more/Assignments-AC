<!DOCTYPE html>
<html>
<head>
    <title>Q4 - Highlight Bold Words</title>
</head>
<body>

<p>
We have just started this section for the users 
(<b>beginner</b> to <b>intermediate</b>) who want to work with 
<b>JavaScript</b> problems and write scripts online.
</p>

<a href="#" onmouseover="highlight()" onmouseout="removeHighlight()">
Hover over this link
</a>

<script>
function highlight() {
    let boldWords = document.getElementsByTagName("b");
    for (let i = 0; i < boldWords.length; i++) {
        boldWords[i].style.backgroundColor = "yellow";
    }
}

function removeHighlight() {
    let boldWords = document.getElementsByTagName("b");
    for (let i = 0; i < boldWords.length; i++) {
        boldWords[i].style.backgroundColor = "transparent";
    }
}
</script>

</body>
</html>
